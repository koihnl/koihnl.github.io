        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
         :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --accent-color: #e74c3c;
            --text-color: #333;
            --light-bg: #f8f9fa;
            --border-color: #ddd;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --category-color: #27ae60;
            --date-color: #7f8c8d;
            --level-1-color: #3498db;
            --level-2-color: #2ecc71;
            --level-3-color: #e67e22;
            --level-4-color: #9b59b6;
            --level-5-color: #e74c3c;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: #f5f7fa;
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 20px;
            height: 100%;
        }
        /* 头部样式 */
        
        header {
            background: linear-gradient(135deg, var(--secondary-color), #1a252f);
            color: white;
            padding: 18px 0;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 80px;
        }
        
        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            height: 100%;
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: white;
            margin: 0 auto;
        }
        /* 主体布局 */
        
        main {
            height: calc(100vh - 80px);
            padding: 20px 0;
        }
        
        main .container {
            display: flex;
            gap: 30px;
            height: 100%;
        }
        /* 侧边栏 - 平铺显示所有目录 */
        
        .sidebar {
            flex: 0 0 380px;
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow);
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .category-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        
        .category-header h3 {
            color: var(--secondary-color);
            font-size: 1.3rem;
            margin-bottom: 15px;
        }
        /* 搜索区域样式 */
        
        .search-container {
            margin-bottom: 15px;
        }
        
        .search-box {
            position: relative;
            display: flex;
            align-items: center;
            background: #f5f7fa;
            border-radius: 8px;
            padding: 0 15px;
            border: 1px solid var(--border-color);
        }
        
        .search-box i {
            color: #666;
            margin-right: 10px;
            font-size: 1rem;
        }
        
        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            padding: 12px 0;
            font-size: 1rem;
            background: transparent;
            width: 100%;
        }
        
        #clear-search {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            padding: 5px;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        
        #clear-search:hover {
            color: var(--accent-color);
        }
        
        .search-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 0.9rem;
            color: #7f8c8d;
        }
        
        .category-count {
            font-weight: 500;
        }
        /* 目录列表样式 - 平铺显示 */
        
        .directory-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }
        
        .directory-item {
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }
        
        .directory-item:hover {
            background-color: #f8fafc;
        }
        
        .directory-item.active {
            background-color: #e8f4fc;
            border-left: 4px solid var(--primary-color);
        }
        
        .directory-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--primary-color);
        }
        /* 不同层级样式 - 平铺显示 */
        
        .level-1 {
            font-weight: 700;
            color: var(--level-1-color);
            background-color: rgba(52, 152, 219, 0.05);
            padding-left: 25px;
            font-size: 1.1rem;
            padding-top: 20px;
            padding-bottom: 20px;
        }
        
        .level-2 {
            font-weight: 600;
            color: var(--level-2-color);
            background-color: rgba(46, 204, 113, 0.03);
            padding-left: 35px;
        }
        
        .level-3 {
            font-weight: 500;
            color: var(--level-3-color);
            background-color: rgba(230, 126, 34, 0.03);
            padding-left: 45px;
            font-size: 0.95rem;
        }
        
        .level-4 {
            font-weight: 500;
            color: var(--level-4-color);
            background-color: rgba(155, 89, 182, 0.03);
            padding-left: 55px;
            font-size: 0.95rem;
        }
        
        .level-5 {
            font-weight: 400;
            color: var(--level-5-color);
            padding-left: 65px;
            font-size: 0.9rem;
            background-color: rgba(231, 76, 60, 0.02);
        }
        /* 内容区域 - 平铺显示所有题目 */
        
        .content {
            flex: 1;
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .all-questions-container {
            flex: 1;
            overflow-y: auto;
            padding: 35px 40px;
            height: 100%;
        }
        
        .all-questions-container::-webkit-scrollbar {
            width: 8px;
        }
        
        .all-questions-container::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 4px;
        }
        
        .all-questions-container::-webkit-scrollbar-thumb:hover {
            background: #a0aec0;
        }
        /* 套题容器 - 用于定位 */
        
        .article-container {
            margin-bottom: 60px;
            position: relative;
        }
        
        .article-container:last-child {
            margin-bottom: 0;
        }
        
        .article-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e8f4fc;
            position: sticky;
            top: 0;
            background-color: white;
            z-index: 10;
            padding-top: 10px;
        }
        
        .article-title-full {
            color: var(--secondary-color);
            font-size: 2rem;
            margin-bottom: 15px;
            line-height: 1.3;
            font-weight: 700;
        }
        
        .article-meta {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .article-date {
            color: var(--date-color);
            font-weight: 500;
            font-size: 1rem;
            background: #f5f7fa;
            padding: 5px 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
        }
        
        .article-category {
            color: var(--category-color);
            font-weight: 600;
            font-size: 1rem;
            background: #e8f6ef;
            padding: 5px 15px;
            border-radius: 6px;
        }
        /* 题目和解析样式 */
        
        .question-container {
            margin: 30px 0;
            padding: 20px;
            border-radius: 8px;
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
        }
        
        .question-title {
            color: var(--primary-color);
            font-size: 1.4rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e8f4fc;
            font-weight: 600;
        }
        
        .question-content {
            background-color: white;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 25px;
            font-size: 1.1rem;
            line-height: 1.7;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Georgia', 'Times New Roman', serif;
            color: #2c3e50;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }
        /* 解析按钮和内容 */
        
        .answer-toggle-btn {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            margin: 10px 0 20px 0;
            transition: background-color 0.2s;
        }
        
        .answer-toggle-btn:hover {
            background-color: #2980b9;
        }
        
        .answer-container {
            margin: 20px 0;
            display: none;
        }
        
        .answer-container.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        .answer-title {
            color: var(--accent-color);
            font-size: 1.4rem;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #fde8e8;
            font-weight: 600;
        }
        
        .answer-content {
            background-color: #fff9e6;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            padding: 25px;
            font-size: 1.1rem;
            line-height: 1.7;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Georgia', 'Times New Roman', serif;
            color: #2c3e50;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #7f8c8d;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #bdc3c7;
        }
        
        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #95a5a6;
        }
        
        .empty-state p {
            font-size: 1.1rem;
        }
        
        .highlight {
            background-color: #fff3cd;
            padding: 2px 4px;
            border-radius: 3px;
            font-weight: 500;
        }
        /* 响应式设计 */
        
        @media (max-width: 1200px) {
            main .container {
                gap: 20px;
            }
            .sidebar {
                flex: 0 0 350px;
            }
            .article-title-full {
                font-size: 1.8rem;
            }
        }
        
        @media (max-width: 992px) {
            main .container {
                flex-direction: column;
                height: auto;
            }
            .sidebar {
                flex: none;
                width: 100%;
                height: 450px;
            }
            .content {
                height: auto;
                min-height: 500px;
            }
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 0 15px;
            }
            .all-questions-container {
                padding: 25px;
            }
            .article-title-full {
                font-size: 1.6rem;
            }
            .question-content,
            .answer-content {
                padding: 20px;
                font-size: 1rem;
            }
            .sidebar {
                height: 400px;
            }
            .category-header {
                padding: 15px 20px;
            }
            .level-1 {
                padding-left: 20px;
            }
            .level-2 {
                padding-left: 30px;
            }
            .level-3 {
                padding-left: 40px;
            }
            .level-4 {
                padding-left: 50px;
            }
            .level-5 {
                padding-left: 60px;
            }
        }
        
        @media (max-width: 576px) {
            .all-questions-container {
                padding: 20px;
            }
            .article-title-full {
                font-size: 1.5rem;
            }
            .question-content,
            .answer-content {
                padding: 15px;
                font-size: 0.95rem;
            }
            .directory-item {
                padding: 12px 15px 12px 20px;
            }
            .level-1 {
                padding-left: 15px;
            }
            .level-2 {
                padding-left: 25px;
            }
            .level-3 {
                padding-left: 35px;
            }
            .level-4 {
                padding-left: 45px;
            }
            .level-5 {
                padding-left: 55px;
            }
        }
    </style>
</head>

                    class InterviewSite {
                        constructor(data) {
                            this.categoryData = data;
                            this.flatItems = []; // 所有目录项平铺
                            this.flatQuestions = []; // 所有题目平铺
                            this.allDirectoryItems = []; // 所有目录项（用于左侧显示）
                            this.searchTimeout = null;
                            this.currentActiveId = null;
                            this.scrollTimeout = null;
                            this.isScrolling = false;
                            this.articlePositions = []; // 套题位置
                            this.questionPositions = []; // 题目位置

                            this.init();
                        }

                        init() {
                            // 扁平化数据
                            this.flattenData();

                            // 渲染目录列表
                            this.renderDirectoryList();

                            // 渲染所有题目
                            this.renderAllQuestions();

                            // 绑定事件
                            this.bindEvents();

                            // 设置滚动监听
                            this.setupScrollTracking();
                        }

                        // 扁平化数据
                        flattenData() {
                            const traverse = (items, level) => {
                                items.forEach(item => {
                                    // 添加到目录项
                                    this.allDirectoryItems.push({
                                        id: item.id,
                                        title: item.title,
                                        level: item.level,
                                        type: item.type || 'category',
                                        date: item.date,
                                        category: item.category
                                    });

                                    // 如果是套题（四级目录），添加到flatItems
                                    if (item.type === 'article') {
                                        this.flatItems.push({
                                            id: item.id,
                                            title: item.title,
                                            level: item.level,
                                            type: 'article',
                                            date: item.date,
                                            category: item.category,
                                            questions: item.questions || []
                                        });

                                        // 添加题目到flatQuestions
                                        if (item.questions && item.questions.length > 0) {
                                            item.questions.forEach(question => {
                                                this.flatQuestions.push({
                                                    id: question.id,
                                                    title: question.title,
                                                    level: question.level,
                                                    type: 'question',
                                                    question: question.question,
                                                    answer: question.answer,
                                                    parentId: item.id
                                                });

                                                // 添加到目录项
                                                this.allDirectoryItems.push({
                                                    id: question.id,
                                                    title: question.title,
                                                    level: question.level,
                                                    type: 'question'
                                                });
                                            });
                                        }
                                    }

                                    // 递归处理子项
                                    if (item.children && item.children.length > 0) {
                                        traverse(item.children, level + 1);
                                    }
                                });
                            };

                            traverse(this.categoryData, 1);
                        }

                        // 渲染目录列表
                        renderDirectoryList(filteredItems = null) {
                            const listContainer = document.getElementById('directory-list');
                            const categoryCount = document.getElementById('category-count');

                            const itemsToRender = filteredItems || this.allDirectoryItems;

                            if (itemsToRender.length === 0) {
                                listContainer.innerHTML = '<div class="empty-state"><p>没有找到匹配的目录</p></div>';
                                categoryCount.textContent = `0 个目录项`;
                                return;
                            }

                            listContainer.innerHTML = itemsToRender.map(item => {
                                const isActive = this.currentActiveId === item.id;
                                const levelClass = `level-${item.level}`;

                                return `
                            <div class="directory-item ${levelClass} ${isActive ? 'active' : ''}" 
                                 data-id="${item.id}" data-type="${item.type}">
                                ${item.title}
                            </div>
                        `;
                            }).join('');

                            categoryCount.textContent = `${itemsToRender.length} 个目录项`;

                            // 绑定点击事件
                            this.bindDirectoryEvents();
                        }

                        // 绑定目录点击事件
                        bindDirectoryEvents() {
                            const listContainer = document.getElementById('directory-list');

                            listContainer.querySelectorAll('.directory-item').forEach(item => {
                                item.addEventListener('click', () => {
                                    const itemId = item.dataset.id;
                                    const itemType = item.dataset.type;

                                    if (itemType === 'article') {
                                        // 点击套题，滚动到套题位置
                                        this.scrollToArticle(itemId);
                                    } else if (itemType === 'question') {
                                        // 点击题目，滚动到题目位置
                                        this.scrollToQuestion(itemId);
                                    } else {
                                        // 点击分类，滚动到顶部
                                        document.getElementById('all-questions-container').scrollTop = 0;
                                    }
                                });
                            });
                        }

                        // 滚动到套题
                        scrollToArticle(articleId) {
                            const articleElement = document.getElementById(articleId);
                            if (articleElement) {
                                articleElement.scrollIntoView({
                                    behavior: 'smooth',
                                    block: 'start'
                                });
                            }
                        }

                        // 滚动到题目
                        scrollToQuestion(questionId) {
                            const questionElement = document.getElementById(questionId);
                            if (questionElement) {
                                questionElement.scrollIntoView({
                                    behavior: 'smooth',
                                    block: 'start'
                                });
                            }
                        }

                        // 渲染所有题目
                        renderAllQuestions() {
                                const container = document.getElementById('all-questions-container');

                                if (this.flatItems.length === 0) {
                                    container.innerHTML = `
                            <div class="empty-state">
                                <i class="fas fa-file-alt"></i>
                                <h3>暂无题目</h3>
                                <p>暂时没有面试题目。</p>
                            </div>
                        `;
                                    return;
                                }

                                container.innerHTML = this.flatItems.map(article => {
                                            return `
                            <div class="article-container" id="${article.id}">
                                <div class="article-header">
                                    <h1 class="article-title-full">${article.title}</h1>
                                    <div class="article-meta">
                                        <span class="article-date">${article.date}</span>
                                        <span class="article-category">${article.category}</span>
                                    </div>
                                </div>
                                <div class="article-body">
                                    ${article.questions.map((question, index) => `
                                        <div class="question-container" id="${question.id}">
                                            <h2 class="question-title">题目 ${index + 1}</h2>
                                            <pre class="question-content">${question.question}</pre>
                                            <button class="answer-toggle-btn" data-question-id="${question.id}">
                                                显示解析
                                            </button>
                                            <div class="answer-container" id="answer-${question.id}">
                                                <h2 class="answer-title">解析 ${index + 1}</h2>
                                                <pre class="answer-content">${question.answer}</pre>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `;
                    }).join('');
                    
                    // 绑定解析按钮事件
                    this.bindAnswerToggleEvents();
                    
                    // 计算位置
                    setTimeout(() => {
                        this.calculatePositions();
                    }, 300);
                }
                
                // 绑定解析按钮事件
                bindAnswerToggleEvents() {
                    const container = document.getElementById('all-questions-container');
                    
                    container.querySelectorAll('.answer-toggle-btn').forEach(btn => {
                        const questionId = btn.dataset.questionId;
                        const answerContainer = document.getElementById(`answer-${questionId}`);
                        
                        btn.addEventListener('click', function() {
                            if (answerContainer.classList.contains('show')) {
                                answerContainer.classList.remove('show');
                                this.textContent = '显示解析';
                            } else {
                                answerContainer.classList.add('show');
                                this.textContent = '隐藏解析';
                            }
                        });
                    });
                }
                
                // 计算套题和题目位置
                calculatePositions() {
                    this.articlePositions = [];
                    this.questionPositions = [];
                    
                    const container = document.getElementById('all-questions-container');
                    const articles = container.querySelectorAll('.article-container');
                    const questions = container.querySelectorAll('.question-container');
                    
                    articles.forEach(article => {
                        const rect = article.getBoundingClientRect();
                        const containerRect = container.getBoundingClientRect();
                        const relativeTop = rect.top - containerRect.top + container.scrollTop;
                        
                        this.articlePositions.push({
                            id: article.id,
                            top: relativeTop,
                            bottom: relativeTop + rect.height
                        });
                    });
                    
                    questions.forEach(question => {
                        const rect = question.getBoundingClientRect();
                        const containerRect = container.getBoundingClientRect();
                        const relativeTop = rect.top - containerRect.top + container.scrollTop;
                        
                        this.questionPositions.push({
                            id: question.id,
                            top: relativeTop,
                            bottom: relativeTop + rect.height
                        });
                    });
                }
                
                // 设置滚动跟踪
                setupScrollTracking() {
                    const container = document.getElementById('all-questions-container');
                    
                    container.addEventListener('scroll', () => {
                        if (this.isScrolling) return;
                        
                        this.isScrolling = true;
                        
                        if (this.scrollTimeout) {
                            clearTimeout(this.scrollTimeout);
                        }
                        
                        this.scrollTimeout = setTimeout(() => {
                            this.handleScroll();
                            this.isScrolling = false;
                        }, 100);
                    });
                    
                    // 初始计算位置
                    setTimeout(() => this.calculatePositions(), 500);
                }
                
                // 处理滚动
                handleScroll() {
                    if (this.articlePositions.length === 0 || this.questionPositions.length === 0) {
                        return;
                    }
                    
                    const container = document.getElementById('all-questions-container');
                    const scrollTop = container.scrollTop;
                    const containerHeight = container.clientHeight;
                    
                    // 先检查题目位置
                    let currentId = null;
                    const referencePoint = scrollTop + containerHeight * 0.3;
                    
                    // 查找当前题目
                    for (let i = 0; i < this.questionPositions.length; i++) {
                        const question = this.questionPositions[i];
                        
                        if (referencePoint >= question.top && referencePoint <= question.bottom) {
                            currentId = question.id;
                            break;
                        }
                        
                        // 如果滚动位置在题目之间
                        if (i < this.questionPositions.length - 1) {
                            const nextQuestion = this.questionPositions[i + 1];
                            if (referencePoint > question.bottom && referencePoint < nextQuestion.top) {
                                // 选择上一个题目
                                currentId = question.id;
                                break;
                            }
                        }
                    }
                    
                    // 如果没找到题目，检查套题位置
                    if (!currentId) {
                        for (let i = 0; i < this.articlePositions.length; i++) {
                            const article = this.articlePositions[i];
                            
                            if (referencePoint >= article.top && referencePoint <= article.bottom) {
                                currentId = article.id;
                                break;
                            }
                        }
                    }
                    
                    // 更新左侧高亮
                    if (currentId && currentId !== this.currentActiveId) {
                        this.currentActiveId = currentId;
                        this.highlightCurrentItem();
                        
                        // 确保左侧目录可见
                        const activeElement = document.querySelector(`.directory-item[data-id="${currentId}"]`);
                        if (activeElement) {
                            const listContainer = document.getElementById('directory-list');
                            const itemRect = activeElement.getBoundingClientRect();
                            const listRect = listContainer.getBoundingClientRect();
                            
                            if (itemRect.top < listRect.top) {
                                // 项目在可见区域上方，滚动到顶部
                                activeElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            } else if (itemRect.bottom > listRect.bottom) {
                                // 项目在可见区域下方，滚动到底部
                                activeElement.scrollIntoView({ behavior: 'smooth', block: 'end' });
                            }
                        }
                    }
                }
                
                // 高亮当前项
                highlightCurrentItem() {
                    const listContainer = document.getElementById('directory-list');
                    
                    listContainer.querySelectorAll('.directory-item').forEach(item => {
                        item.classList.remove('active');
                        if (item.dataset.id === this.currentActiveId) {
                            item.classList.add('active');
                        }
                    });
                }
                
                // 搜索内容
                searchContent(query) {
                    clearTimeout(this.searchTimeout);
                    
                    this.searchTimeout = setTimeout(() => {
                        const searchLower = query.toLowerCase().trim();
                        const searchResultCount = document.getElementById('search-result-count');
                        
                        if (!searchLower) {
                            this.renderDirectoryList();
                            searchResultCount.textContent = `找到 ${this.allDirectoryItems.length} 个内容`;
                            return;
                        }
                        
                        // 搜索所有内容
                        const searchResults = [];
                        
                        // 搜索目录项
                        const directoryResults = this.allDirectoryItems.filter(item => {
                            return item.title && item.title.toLowerCase().includes(searchLower);
                        });
                        
                        // 搜索题目内容
                        const questionResults = this.flatQuestions.filter(question => {
                            return (question.question && question.question.toLowerCase().includes(searchLower)) ||
                                   (question.answer && question.answer.toLowerCase().includes(searchLower));
                        });
                        
                        // 合并结果
                        const allResults = [...directoryResults, ...questionResults];
                        
                        // 去重
                        const uniqueResults = [];
                        const seenIds = new Set();
                        
                        allResults.forEach(item => {
                            if (!seenIds.has(item.id)) {
                                seenIds.add(item.id);
                                uniqueResults.push(item);
                            }
                        });
                        
                        // 渲染搜索结果
                        this.renderDirectoryList(uniqueResults);
                        
                        // 显示搜索结果数量
                        searchResultCount.textContent = `找到 ${uniqueResults.length} 个内容`;
                        
                        // 如果有搜索结果，滚动到第一个结果
                        if (uniqueResults.length > 0) {
                            const firstResult = uniqueResults[0];
                            this.currentActiveId = firstResult.id;
                            this.highlightCurrentItem();
                            
                            if (firstResult.type === 'question') {
                                this.scrollToQuestion(firstResult.id);
                            } else if (firstResult.type === 'article') {
                                this.scrollToArticle(firstResult.id);
                            }
                        }
                    }, 300);
                }
                
                // 绑定事件
                bindEvents() {
                    const searchInput = document.getElementById('search-input');
                    const clearSearch = document.getElementById('clear-search');
                    
                    // 搜索输入事件
                    searchInput.addEventListener('input', (e) => {
                        this.searchContent(e.target.value);
                    });
                    
                    // 清除搜索
                    clearSearch.addEventListener('click', () => {
                        searchInput.value = '';
                        this.searchContent('');
                        searchInput.focus();
                    });
                    
                    // 窗口大小变化时重新计算位置
                    window.addEventListener('resize', () => {
                        setTimeout(() => {
                            this.calculatePositions();
                        }, 200);
                    });
                    
                    // 键盘快捷键
                    document.addEventListener('keydown', (e) => {
                        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                            e.preventDefault();
                            searchInput.focus();
                        }
                        
                        if (e.key === 'Escape' && document.activeElement === searchInput) {
                            searchInput.value = '';
                            this.searchContent('');
                            searchInput.blur();
                        }
                    });
                }
            }
            
            // 初始化应用，传入数据
            new InterviewSite(interviewData);
        });
    </script>
